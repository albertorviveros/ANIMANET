name: Compilar APK AnimaNet

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Generar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK requerido
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Instalar Gradle 8.7
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Compilar APK Debug
        run: gradle assembleDebug --no-daemon

      - name: Subir APK para descarga
        uses: actions/upload-artifact@v4
        with:
          name: AnimaNet-APK
          path: app/build/outputs/apk/debug/app-debug.apk
